<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#F59E0B">
  <title>Tu opinión nos importa</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <script src="js/core/config.js"></script>
  <style>
    body{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:18px;background:var(--bg,#0A0E1A)}
    .fb-card{width:100%;max-width:440px}
    .stars{display:flex;gap:8px;margin-top:6px}
    .star{font-size:30px;cursor:pointer;filter:grayscale(1);opacity:.5;transition:.15s;background:none;border:none}
    .star.on{filter:none;opacity:1;transform:scale(1.05)}
    .lbl{font-weight:700;font-size:13px;margin-top:14px;display:block}
  </style>
</head>
<body>
  <div class="card fb-card" id="fb-root">
    <div style="text-align:center;margin-bottom:10px">
      <div style="font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:1px">🔧 Tu opinión nos importa</div>
      <div style="color:var(--text3);font-size:12px">Cuéntanos cómo te fue con tu servicio y productos.</div>
    </div>

    <label class="lbl">⭐ Calidad del servicio</label>
    <div class="stars" id="st-serv"></div>
    <label class="lbl">📦 Calidad de los productos / repuestos</label>
    <div class="stars" id="st-prod"></div>

    <label class="lbl">💬 Comentario (opcional)</label>
    <textarea class="form-input" id="fb-com" rows="3" placeholder="¿Qué podemos mejorar?"></textarea>

    <div style="background:var(--surface2,#161E2E);border-radius:10px;padding:12px;margin-top:14px">
      <div style="font-size:12px;color:var(--amber);font-weight:700;margin-bottom:6px">⭐ Gana 50 puntos de fidelización</div>
      <div style="font-size:11px;color:var(--text3);margin-bottom:8px">Si estás registrado con nosotros, déjanos tu teléfono o correo y te abonamos 50 puntos por tu opinión.</div>
      <input class="form-input" id="fb-nom" placeholder="Tu nombre" style="margin-bottom:8px">
      <input class="form-input" id="fb-tel" placeholder="Teléfono" style="margin-bottom:8px">
      <input class="form-input" id="fb-mail" type="email" placeholder="Correo (opcional)">
    </div>

    <button class="btn btn-amber" style="width:100%;margin-top:14px;padding:12px;font-size:15px" id="fb-send" onclick="enviar()">Enviar opinión</button>
    <div id="fb-msg" style="text-align:center;font-size:12px;margin-top:10px;color:var(--text3)"></div>
  </div>

  <script>
    const params = new URLSearchParams(location.search);
    const TENANT = params.get('t') || params.get('tenant') || '';
    const origen = params.get('o') || 'qr';
    const rate = { serv:0, prod:0 };
    function pintarEstrellas(cont, key){
      const el = document.getElementById(cont);
      el.innerHTML = [1,2,3,4,5].map(n=>`<button class="star" data-n="${n}" onclick="setRate('${key}',${n})">★</button>`).join('');
      [...el.children].forEach(b=>{ b.classList.toggle('on', Number(b.dataset.n)<=rate[key]); });
    }
    function setRate(key,n){ rate[key]=n; pintarEstrellas(key==='serv'?'st-serv':'st-prod', key); }
    pintarEstrellas('st-serv','serv'); pintarEstrellas('st-prod','prod');

    async function enviar(){
      const btn = document.getElementById('fb-send');
      const msg = document.getElementById('fb-msg');
      if(!TENANT){ msg.textContent='Enlace inválido (falta el taller).'; msg.style.color='var(--red)'; return; }
      if(!rate.serv && !rate.prod){ msg.textContent='Por favor califica al menos un aspecto.'; msg.style.color='var(--red)'; return; }
      btn.disabled = true; msg.style.color='var(--text3)'; msg.textContent='Enviando...';
      try{
        const r = await fetch(`${SUPABASE_URL}/functions/v1/feedback-submit`, {
          method:'POST',
          headers:{ 'Content-Type':'application/json', 'apikey':SUPABASE_KEY, 'Authorization':`Bearer ${SUPABASE_KEY}` },
          body: JSON.stringify({
            tenant: TENANT, origen,
            nombre: document.getElementById('fb-nom').value.trim(),
            telefono: document.getElementById('fb-tel').value.trim(),
            email: document.getElementById('fb-mail').value.trim(),
            comentario: document.getElementById('fb-com').value.trim(),
            rating_servicio: rate.serv, rating_productos: rate.prod
          })
        });
        const d = await r.json();
        if(!r.ok || d.error){ msg.textContent = d.error || 'No se pudo enviar'; msg.style.color='var(--red)'; btn.disabled=false; return; }
        document.getElementById('fb-root').innerHTML = `
          <div style="text-align:center;padding:20px">
            <div style="font-size:46px">🙏</div>
            <h2 class="font-display" style="margin:8px 0">¡Gracias por tu opinión!</h2>
            ${d.identificado ? `<p style="color:var(--amber);font-weight:700">Si estás registrado con nosotros, ¡te abonamos 50 puntos! ⭐</p>` : '<p style="color:var(--text3);font-size:13px">Tu opinión nos ayuda a mejorar.</p>'}
          </div>`;
      }catch(e){ msg.textContent='Error de conexión. Intenta de nuevo.'; msg.style.color='var(--red)'; btn.disabled=false; }
    }
  </script>
</body>
</html>
