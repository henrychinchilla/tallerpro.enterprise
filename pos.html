<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <script>/* tema claro por defecto, antes del primer paint para evitar flash */
    (function(){var t=localStorage.getItem('tp_tema')||'light';
     if(t==='auto')t=matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light';
     document.documentElement.setAttribute('data-theme',t);})();</script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#F59E0B">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="TallerPro POS">
  <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-72.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512.png">
  <link rel="shortcut icon" href="/icons/icon-192.png">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <title>TallerPro — Punto de Venta</title>
  <link rel="stylesheet" href="css/base.css?v=3.3">
  <link rel="stylesheet" href="css/layout.css?v=3.3">
  <link rel="stylesheet" href="css/components.css?v=3.3">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Manrope:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <div id="pos-root" style="min-height:100vh"></div>

  <!-- Modal (reutiliza UI.modal del core) -->
  <div id="modal-overlay" class="modal-overlay">
    <div id="modal-box" class="modal">
      <div class="modal-header">
        <h3 class="modal-title" id="modal-titulo"></h3>
        <button class="modal-close" onclick="UI.cerrarModal()">✕</button>
      </div>
      <div id="modal-body" class="modal-body"></div>
    </div>
  </div>

  <script src="js/core/config.js?v=3.3"></script>
  <script>
    function getSB(){ return window._sb || (window._sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY)); }
    function getTID(){ return window.Auth?.tenant?.id || window._cachedTenantId || null; }
  </script>
  <script src="js/core/ui.js?v=3.3"></script>
  <script src="js/core/db.js?v=3.3"></script>
  <script src="js/core/auth.js?v=3.3"></script>
  <script src="js/core/integraciones.js?v=3.3"></script>
  <script src="js/pos/pos.js?v=3.3"></script>
  <script>POS.iniciar();</script>
</body>
</html>
