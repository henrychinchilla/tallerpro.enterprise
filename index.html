<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#F59E0B">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="TallerPro">
  <link rel="manifest" href="manifest.json">
  <title>TallerPro Enterprise</title>

  <!-- ── FUENTES ─────────────────────────────────────── -->
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- ── ESTILOS ─────────────────────────────────────── -->
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">

  <!-- ── LIBRERÍAS EXTERNAS ──────────────────────────── -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>

  <style>
    /* Login dinámico */
    .login-title { font-family:'Bebas Neue',sans-serif; font-size:32px; letter-spacing:.06em; color:var(--amber); margin:4px 0; text-align:center; }
    .login-sub   { font-size:12px; color:var(--text3); text-align:center; margin-bottom:20px; }
    .login-form  { display:flex; flex-direction:column; gap:12px; }
    .btn-quick   { padding:6px 12px; font-size:11px; font-family:'Manrope',sans-serif; font-weight:600;
                   background:var(--surface2); border:1px solid var(--border); border-radius:6px;
                   color:var(--text2); cursor:pointer; transition:all .2s; }
    .btn-quick:hover { border-color:var(--amber); color:var(--amber); }
  </style>

  <style id="theme-vars">
    /* ── DARK (default) ────────── */
    :root, [data-theme="dark"] {
      --bg:#080C10; --surface:#0D1117; --surface2:#141B24; --surface3:#1A2535;
      --border:rgba(30,45,61,0.8); --amber:#F59E0B; --amber-dim:rgba(245,158,11,0.12);
      --amber-border:rgba(245,158,11,0.3); --cyan:#06B6D4; --green:#10B981;
      --red:#EF4444; --red-dim:rgba(239,68,68,0.12); --red-border:rgba(239,68,68,0.3);
      --purple:#8B5CF6; --purple-dim:rgba(139,92,246,0.12); --purple-border:rgba(139,92,246,0.3);
      --cyan-border:rgba(6,182,212,0.3); --green-border:rgba(16,185,129,0.3);
      --text:#E2E8F0; --text2:#94A3B8; --text3:#4A5568;
    }
    /* ── LIGHT ─────────────────── */
    [data-theme="light"] {
      --bg:#F8FAFC; --surface:#FFFFFF; --surface2:#F1F5F9; --surface3:#E2E8F0;
      --border:rgba(148,163,184,0.4); --amber:#D97706; --amber-dim:rgba(217,119,6,0.08);
      --amber-border:rgba(217,119,6,0.3); --cyan:#0891B2; --green:#059669;
      --red:#DC2626; --red-dim:rgba(220,38,38,0.08); --red-border:rgba(220,38,38,0.25);
      --purple:#7C3AED; --purple-dim:rgba(124,58,237,0.08); --purple-border:rgba(124,58,237,0.25);
      --cyan-border:rgba(8,145,178,0.3); --green-border:rgba(5,150,105,0.3);
      --text:#1E293B; --text2:#475569; --text3:#94A3B8;
    }
    /* ── BLUE NAVY ──────────────── */
    [data-theme="blue"] {
      --bg:#0A192F; --surface:#112240; --surface2:#1D3461; --surface3:#233D6F;
      --border:rgba(30,90,150,0.6); --amber:#64FFDA; --amber-dim:rgba(100,255,218,0.08);
      --amber-border:rgba(100,255,218,0.3); --cyan:#57CBFF; --green:#64FFDA;
      --red:#FF6B6B; --red-dim:rgba(255,107,107,0.12); --red-border:rgba(255,107,107,0.3);
      --purple:#C792EA; --purple-dim:rgba(199,146,234,0.1); --purple-border:rgba(199,146,234,0.3);
      --cyan-border:rgba(87,203,255,0.3); --green-border:rgba(100,255,218,0.3);
      --text:#CCD6F6; --text2:#8892B0; --text3:#4A5568;
    }
    /* ── GREEN ──────────────────── */
    [data-theme="green"] {
      --bg:#0A1A0A; --surface:#0D1F0D; --surface2:#162616; --surface3:#1E331E;
      --border:rgba(20,80,20,0.7); --amber:#4ADE80; --amber-dim:rgba(74,222,128,0.1);
      --amber-border:rgba(74,222,128,0.3); --cyan:#34D399; --green:#22C55E;
      --red:#F87171; --red-dim:rgba(248,113,113,0.1); --red-border:rgba(248,113,113,0.3);
      --purple:#A78BFA; --purple-dim:rgba(167,139,250,0.1); --purple-border:rgba(167,139,250,0.3);
      --cyan-border:rgba(52,211,153,0.3); --green-border:rgba(34,197,94,0.3);
      --text:#D1FAE5; --text2:#6EE7B7; --text3:#374151;
    }
  </style>
</head>
<body>

<!-- ══════════════════════════════════════════════════════
     LOGIN — Renderizado dinámicamente por auth.js
════════════════════════════════════════════════════════ -->
<div id="login-screen">
  <div class="login-box">
    <!-- auth.js → renderLoginScreen() llena este contenedor -->
    <div class="login-logo">🔧</div>
    <h1 class="login-title">TallerPro</h1>
    <p class="login-sub">Enterprise · AI-Driven SaaS</p>
    <div style="text-align:center;color:var(--text3);font-size:13px;margin-top:20px">Cargando...</div>
  </div>
</div>

<!-- ══════════════════════════════════════════════════════
     MOBILE HEADER
════════════════════════════════════════════════════════ -->
<header class="mobile-header">
  <button class="mobile-menu-btn" onclick="toggleSidebar()">☰</button>
  <span style="font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--amber)">TallerPro</span>
  <span id="mobile-page-label" class="mobile-page-label"></span>
</header>
<div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleSidebar()"></div>

<!-- ══════════════════════════════════════════════════════
     APP SHELL
════════════════════════════════════════════════════════ -->
<div id="app">

  <!-- SIDEBAR -->
  <nav id="sidebar">
    <div class="sidebar-brand">
      <div class="sidebar-brand-name">TallerPro</div>
      <div class="sidebar-brand-sub">Enterprise v2.0</div>
    </div>
    <div class="sidebar-tenant" id="sidebar-tenant-info">
      <div class="sidebar-tenant-name">—</div>
      <div class="sidebar-tenant-plan">—</div>
    </div>
    <div class="sidebar-nav" id="sidebar-nav"></div>
    <div class="sidebar-user" id="sidebar-user" onclick="THEME.renderPicker()" style="cursor:pointer" title="Cambiar tema"></div>
  </nav>

  <!-- MAIN -->
  <main id="main">
    <div id="page-content"></div>
  </main>

</div>

<!-- ══════════════════════════════════════════════════════
     MODAL GLOBAL
════════════════════════════════════════════════════════ -->
<div class="modal-overlay" id="modal-overlay" onclick="UI.closeModal(event)">
  <div class="modal" id="modal-box" onclick="event.stopPropagation()">
    <div class="modal-header">
      <span class="modal-title" id="modal-title">—</span>
      <button class="modal-close" onclick="UI.closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<!-- ══════════════════════════════════════════════════════
     JAVASCRIPT — orden de carga importa
════════════════════════════════════════════════════════ -->

<!-- 1. Constantes globales -->
<script src="js/config.js"></script>

<!-- 2. Capa de datos -->
<script src="js/db.js"></script>

<!-- 3. UI helpers (toast, modal, badges) -->
<script src="js/ui.js"></script>

<!-- 5. Autenticación -->
<script src="js/auth.js"></script>

<!-- 6. Namespace de páginas (debe existir antes de los módulos) -->
<script>const Pages = {};</script>

<!-- 7. Módulos de cada página -->
<script src="js/modules/dashboard.js"></script>
<script src="js/modules/clientes.js"></script>
<script src="js/modules/vehiculos.js"></script>
<script src="js/modules/ordenes.js"></script>
<script src="js/modules/inventario.js"></script>
<script src="js/modules/proveedores.js"></script>
<script src="js/modules/rrhh.js"></script>
<script src="js/modules/finanzas.js"></script>
<script src="js/notifications.js"></script>
<script src="js/modules/database.js"></script>
<script src="js/modules/pages.js"></script><!-- calendario, facturación, rrhh, mi-ot, mi-vehículo, config -->

<!-- 8. Módulo FEL -->
<script src="js/fel.js"></script>

<!-- 9. Shell principal (router, sidebar) -->
<script src="js/app.js"></script>

<!-- 9. Arranque -->
<script>
  // App arranca desde auth.js → startApp()
  // Renderizar pantalla de login dinámica
  document.addEventListener('DOMContentLoaded', () => {
    if (typeof renderLoginScreen === 'function') renderLoginScreen();
  });
</script>

</body>
</html>
