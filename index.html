<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <script>/* tema claro por defecto, antes del primer paint para evitar flash */
    (function(){var t=localStorage.getItem('tp_tema')||'light';
     if(t==='auto')t=matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light';
     document.documentElement.setAttribute('data-theme',t);})();</script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#3B82F6">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="TallerPro">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>TallerPro Enterprise</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-72.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512.png">
  <link rel="shortcut icon" href="/icons/icon-192.png">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152.png">
  <link rel="apple-touch-icon" sizes="512x512" href="/icons/icon-512.png">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Manrope:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="login-screen" class="login-screen">
  <div id="login-content"></div>
</div>

<!-- APP -->
<div id="app" class="app-layout">

  <!-- Mobile Header -->
  <header class="mobile-header">
    <button class="mobile-menu-btn" onclick="App.toggleSidebar()">☰</button>
    <span class="mobile-page-label">TALLERPRO</span>
  </header>

  <!-- Sidebar Overlay -->
  <div class="sidebar-overlay" id="sidebar-overlay" onclick="App.toggleSidebar()"></div>

  <!-- Sidebar -->
  <aside id="sidebar" class="sidebar"></aside>

  <!-- Main Content -->
  <main id="main" class="main-content">
    <div id="page-content" class="page-content"></div>
  </main>

</div>

<!-- Modal -->
<div id="modal-overlay" class="modal-overlay">
  <div id="modal-box" class="modal">
    <div class="modal-header">
      <h3 class="modal-title" id="modal-titulo"></h3>
      <button class="modal-close" onclick="UI.cerrarModal()">✕</button>
    </div>
    <div id="modal-body" class="modal-body"></div>
  </div>
</div>

<!-- CORE SCRIPTS -->
<script src="js/core/config.js"></script>
<script>
  function getSB(){ return window._sb || (window._sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY)); }
  function getTID(){ return window.Auth?.tenant?.id || null; }
</script>
<script src="js/core/ui.js"></script>
<script src="js/core/db.js"></script>
<script src="js/core/auth.js"></script>
<script src="js/core/app.js"></script>
<script src="js/core/charts.js"></script>
<script src="js/core/integraciones.js"></script>
<script src="js/core/docs.js"></script>
<script src="js/core/login.js"></script>

<!-- MÓDULOS (organizados por dominio) -->
<!-- Principal -->
<script src="js/modulos/principal/dashboard.js"></script>
<!-- Operación -->
<script src="js/modulos/operacion/clientes.js"></script>
<script src="js/modulos/operacion/vehiculos.js"></script>
<script src="js/modulos/operacion/ordenes.js"></script>
<script src="js/modulos/operacion/inventario.js"></script>
<script src="js/modulos/operacion/bodegas.js"></script>
<script src="js/modulos/operacion/proveedores.js"></script>
<script src="js/modulos/operacion/compras.js"></script>
<script src="js/modulos/operacion/activos.js"></script>
<script src="js/modulos/operacion/envios.js"></script>
<script src="js/modulos/operacion/traslados.js"></script>
<script src="js/modulos/operacion/mi_ot.js"></script>
<!-- Finanzas -->
<script src="js/modulos/finanzas/facturacion.js"></script>
<script src="js/modulos/finanzas/bancos.js"></script>
<script src="js/modulos/finanzas/finanzas.js"></script>
<script src="js/modulos/finanzas/presupuesto.js"></script>
<script src="js/modulos/finanzas/contabilidad.js"></script>
<!-- RRHH -->
<script src="js/modulos/rrhh/rrhh.js"></script>
<!-- Marketing -->
<script src="js/modulos/marketing/marketing.js"></script>
<!-- Herramientas -->
<script src="js/modulos/herramientas/calendario.js"></script>
<script src="js/modulos/herramientas/comunicaciones.js"></script>
<!-- Administración -->
<script src="js/modulos/admin/configuracion.js"></script>
<script src="js/modulos/admin/usuarios.js"></script>
<script src="js/modulos/admin/admin.js"></script>
<script src="js/modulos/admin/respaldos.js"></script>
<script src="js/modulos/admin/superadmin.js"></script>

<script>
  /* Iniciar aplicación — login.js maneja la sesión */

  /* Service Worker */
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  }

  /* Keyboard shortcuts */
  document.addEventListener('keydown', e => {
    if (e.ctrlKey && e.shiftKey && e.key === 'T') { e.preventDefault(); TEMAS.picker(); }
    if (e.key === 'Escape') UI.intentarCerrarModal();
  });
</script>

</body>
</html>
